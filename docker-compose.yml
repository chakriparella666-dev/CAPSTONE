services:

  backend:
    platform: linux/amd64
    build: ./msme-backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URL=${MONGO_URL}
      - JWT_SECRET=${JWT_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - CLIENT_URL=http://localhost:3001
      - PORT=5000
    restart: always
    dns:
      - 8.8.8.8


  frontend:
    platform: linux/amd64
    build:
      context: ./msme-frontend
      args:
        VITE_API_URL: http://localhost:5000/api
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: always
    dns:
      - 8.8.8.8